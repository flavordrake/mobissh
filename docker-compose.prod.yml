services:
  mobissh:
    build: .
    image: mobissh:${TAG:-latest}
    container_name: mobissh-prod
    restart: unless-stopped
    networks:
      - mobissh
    environment:
      PORT: "8081"
      NODE_ENV: production
      TS_AUTHKEY: "${TS_AUTHKEY:-}"
      TS_HOSTNAME: "${TS_HOSTNAME:-mobissh}"
      TS_SERVE: "1"
      TS_SERVE_PORT: "${TS_SERVE_PORT:-443}"
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /var/lib/docker/volumes/dev_workspace/_data/mobissh/test-results/uploads:/app/test-results/uploads
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun

networks:
  mobissh:
    name: mobissh
    external: true

volumes:
  tailscale-state:
    name: mobissh-tailscale-state
    external: true
